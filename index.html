<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeleSyriana Support OS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>TeleSyriana Support OS</h1>
      <div class="toolbar">
        <div class="lang-toggle">
          <button id="langEn" class="secondary active">EN</button>
          <button id="langAr" class="secondary">AR</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card" id="loginCard">
        <h2 data-i18n="login_title">Staff Login</h2>
        <p data-i18n="login_hint">Use Staff Code + PIN (Admin-created accounts only).</p>
        <form id="loginForm" class="compact-form">
          <label data-i18n="staff_code">Staff Code</label>
          <input id="staffCode" required placeholder="0001" />
          <label data-i18n="pin">PIN</label>
          <input id="pin" type="password" required placeholder="2411" />
          <button type="submit" data-i18n="login">Login</button>
        </form>
      </section>

      <section class="card hidden" id="dashboardCard">
        <div class="dashboard-head">
          <h2 id="welcomeText"></h2>
          <div class="row gap">
            <button id="syncBtn" class="secondary" data-i18n="sync">Sync</button>
            <button id="logoutBtn" class="secondary" data-i18n="logout">Logout</button>
          </div>
        </div>

        <div class="grid">
          <article class="panel">
            <h3 data-i18n="time_tracking">Time Tracking</h3>
            <div class="actions">
              <button id="clockInBtn">Clock In</button>
              <button id="clockOutBtn">Clock Out</button>
              <button id="startBreakBtn">Start Break</button>
              <button id="endBreakBtn">End Break</button>
            </div>
            <p id="timeSummary">-</p>
          </article>

          <article class="panel">
            <h3 data-i18n="tickets">Tickets</h3>
            <form id="ticketForm" class="compact-form">
              <input id="orderNumber" placeholder="Order #2515" required />
              <select id="ticketType"></select>
              <select id="ticketPriority"></select>
              <textarea id="ticketNote" placeholder="Internal notes"></textarea>
              <button type="submit" data-i18n="create_ticket">Create Ticket</button>
            </form>
            <ul id="ticketsList" class="list"></ul>
          </article>

          <article class="panel">
            <h3 data-i18n="chat">Internal Chat</h3>
            <div id="chatMessages" class="chat-box"></div>
            <form id="chatForm" class="chat-form">
              <input id="chatInput" placeholder="Type @name message" required />
              <button type="submit" data-i18n="send">Send</button>
            </form>
          </article>

          <article class="panel" id="managerPanel">
            <h3 data-i18n="manager_tools">Manager / Supervisor Tools</h3>
            <p id="teamSummary">-</p>
            <ul id="alertsList" class="list"></ul>
          </article>

          <article class="panel" id="adminPanel">
            <h3 data-i18n="admin_tools">Admin: Staff</h3>
            <form id="staffForm" class="compact-form">
              <input id="newStaffCode" placeholder="Staff Code" required />
              <input id="newStaffName" placeholder="Name" required />
              <select id="newStaffRole"></select>
              <input id="newStaffPin" placeholder="PIN" required />
              <input id="newStaffRate" type="number" step="0.01" placeholder="Hourly Rate" required />
              <select id="newStaffCurrency"><option>USD</option><option>GBP</option></select>
              <button type="submit" data-i18n="add_staff">Add Staff</button>
            </form>
            <ul id="staffList" class="list"></ul>
          </article>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
